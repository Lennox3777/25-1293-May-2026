<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>

        body{
            background: linear-gradient(to right, #dbeafe, #eff6ff);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1{
            text-align: center;
            color: #003366;
        }

        h2{
            color: #004080;
        }

        nav{
            background-color: #003366;
            text-align: center;
            padding: 15px;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        nav a:hover{
            color: yellow;
        }

        .section{
            background-color: white;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px gray;
        }

        input, textarea, select{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button{
            background-color: #003366;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        button:hover{
            background-color: #0066cc;
        }

    </style>

    <script>

        function validateForm(){

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let gender = document.getElementById("gender").value;

            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let phonePattern = /^[0-9]{10,15}$/;

            if(name === ""){
                alert("Please enter your name.");
                return false;
            }

            if(!emailPattern.test(email)){
                alert("Please enter a valid email address (e.g. stacey20@gmail.com)");
                return false;
            }

            if(!phonePattern.test(phone)){
                alert("Phone number must contain only numbers and be between 10 and 15 digits.");
                return false;
            }

            if(gender === ""){
                alert("Please select your gender.");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }

    </script>

</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
        <a href="gallery.html">Gallery</a>
    </nav>

    <div class="section">

        <h1>Contact Us</h1>

        <p>Email: info@computerscience.com</p>
        <p>Phone: +254 700 123 456</p>
        <p>Address: Nairobi, Kenya</p>

        <h2>Send a Message</h2>

        <form onsubmit="return validateForm()">

            <label for="name">Name:</label>
            <input type="text" id="name" name="name">

            <label for="email">Email:</label>
            <input type="text" id="email" name="email"
                   placeholder="example: stacey20@gmail.com">

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" name="phone"
                   placeholder="0712345678">

            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5"></textarea>

            <button type="submit">Send</button>

        </form>

    </div>

</body>
</html>

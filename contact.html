<!DOCTYPE html>
<html>
<head>
    <title>Contact Form Validation</title>

    <script>

        function validateForm() {

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let gender = document.getElementById("gender").value;

            /* Name Validation */
            if (name.length < 3) {
                alert("Name must contain at least 3 characters.");
                return false;
            }

            /* Email Validation Without Regex */
            let atPosition = email.indexOf("@");
            let dotPosition = email.lastIndexOf(".");

            if (
                atPosition < 1 ||
                dotPosition < atPosition + 2 ||
                dotPosition + 2 >= email.length
            ) {
                alert("Enter a valid email such as stacey20@gmail.com");
                return false;
            }

            /* Phone Validation */
            if (phone.length != 10) {
                alert("Phone number must be exactly 10 digits.");
                return false;
            }

            for (let i = 0; i < phone.length; i++) {
                if (phone[i] < "0" || phone[i] > "9") {
                    alert("Phone number should contain numbers only.");
                    return false;
                }
            }

            /* Gender Validation */
            if (gender == "") {
                alert("Please select a gender.");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }

    </script>

</head>

<body>

    <h2>Contact Form</h2>

    <form onsubmit="return validateForm()">

        <label>Name:</label><br>
        <input type="text" id="name"><br><br>

        <label>Email:</label><br>
        <input type="text" id="email"
               placeholder="stacey20@gmail.com"><br><br>

        <label>Phone Number:</label><br>
        <input type="text" id="phone"
               placeholder="0712345678"><br><br>

        <label>Gender:</label><br>
        <select id="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br><br>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
